<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QA Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <header>
        <h1>QA Dashboard</h1>
        <p>Software Testing Management</p>
    </header>


    <section class="cards">

        <div class="card">
            <h3>Total Bugs</h3>
            <span>24</span>
        </div>

        <div class="card">
            <h3>Open Tests</h3>
            <span>145</span>
        </div>

        <div class="card">
            <h3>Status</h3>
            <span class="success">OK</span>
        </div>

    </section>


    <section class="bugs">

        <h2>Recent Bugs</h2>

<table data-cy="bug-table">

            <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Priority</th>
                <th>Status</th>
            </tr>

            <tr>
                <td>BUG-1</td>
                <td>Login error</td>
                <td class="high">HIGH</td>
                <td>Open</td>
            </tr>

            <tr>
                <td>BUG-2</td>
                <td>Button not working</td>
                <td class="medium">MEDIUM</td>
                <td>Testing</td>
            </tr>

        </table>

    </section>


   <button id="createBugBtn" data-cy="create-bug-button">
    + Create Bug
</button>


<div id="bugModal" class="modal">

    <div class="modal-content">

        <h2>Create New Bug</h2>

        <input 
    id="bugTitle" 
    data-cy="bug-title-input"
    placeholder="Bug title">

        <select id="priority">
            <option value="HIGH">HIGH</option>
            <option value="MEDIUM">MEDIUM</option>
            <option value="LOW">LOW</option>
        </select>


      <button id="saveBug" data-cy="save-bug-button">
    Save Bug
</button>

    </div>

</div>


</div>


<script src="script.js"></script>

</body>
</html>
